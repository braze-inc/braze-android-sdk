[versions]

# Gradle plugins
androidGradlePlugin = "8.12.3"
googleServicesPlugin = "4.4.4"

# Java
javaToolchain = "17"

# Checkstyle
checkstyle = "8.35"

# KtLint (CLI version is synced to ktlint-plugins.properties for the IntelliJ plugin)
ktlint = "1.5.0"
ktlintGradlePlugin = "14.2.0"

# Play Services
playServicesBase = "18.3.0"
playServicesLocation = "21.3.0"
playServicesMaps = "17.0.1"
playServicesTagManager = "17.0.1"

# Firebase
firebaseMessaging = "24.1.2"
firebaseCore = "17.5.1"
googleMlVisionBarcode = "16.2.1"

# Glide
glide = "4.16.0"

# AndroidX
androidxAppcompat = "1.7.1"
googleMaterial = "1.13.0"
androidxFragment = "1.8.9"
androidxCore = "1.15.0"
androidxRecyclerview = "1.4.0"
androidxAnnotations = "1.6.0"
androidxSwipeRefreshLayout = "1.2.0"
androidxWebkit = "1.4.0"
androidxConstraintLayout = "2.2.1"
androidxCoordinatorLayout = "1.3.0"
androidxPreference = "1.2.1"
androidxMultidex = "2.0.1"
androidxActivityCompose = "1.7.0"
androidxConcurrentFutures = "1.2.0"
androidxComposeBom = "2025.04.01"
androidxNavigationCompose = "2.7.7"
androidxDatastorePreferences = "1.1.7"

# Test
androidxTestCore = "1.7.0"
androidxTestRunner = "1.7.0"
androidxTestRules = "1.7.0"
androidxTestEspressoCore = "3.7.0"
androidxTestEspressoContrib = "3.7.0"
androidxTestEspressoIdlingResource = "3.7.0"
androidxTestEspressoWeb = "3.7.0"
androidxTestEspressoIntents = "3.7.0"
androidxTestUiAutomator = "2.3.0"
androidxTestExtJunit = "1.3.0"
mockitoCore = "5.21.0"
mockitoAndroid = "5.21.0"
mockitoKotlin = "6.2.3"
junit = "4.13.2"
robolectric = "4.14.1"
hamcrestLibrary = "1.3"
jsonassert = "1.5.3"

# Kotlin
kotlin = "2.2.20"
kotlinCoroutines = "1.10.2"
kotlinLifecycleRuntimeKtx = "2.8.4"
kotlinSerialization = "1.9.0"
kotlinDetektFormatter = "1.23.6"
kotlinDokka = "2.1.0"

# Compose
compose = "1.5.4"
coil = "3.2.0"

# Other
okhttp = "4.12.0"
moshiKotlin = "1.15.2"
huaweiHmsPush = "6.13.0.301"
nexusPublish = "1.3.0"
javaJwt = "4.5.1"
leakcanary = "2.14"
zxingCore = "3.5.3"

[libraries]

# Kotlin
androidx-material3 = { module = "androidx.compose.material3:material3" }
androidx-ui = { module = "androidx.compose.ui:ui" }
kotlin-stdlib = { module = "org.jetbrains.kotlin:kotlin-stdlib", version.ref = "kotlin" }
kotlin-reflect = { module = "org.jetbrains.kotlin:kotlin-reflect", version.ref = "kotlin" }
kotlin-reflect-compat = { module = "org.jetbrains.kotlin:kotlin-reflect", version.ref = "kotlin" }
kotlin-coroutines-android = { module = "org.jetbrains.kotlinx:kotlinx-coroutines-android", version.ref = "kotlinCoroutines" }
kotlin-coroutines-test = { module = "org.jetbrains.kotlinx:kotlinx-coroutines-test", version.ref = "kotlinCoroutines" }
kotlin-serialization-json = { module = "org.jetbrains.kotlinx:kotlinx-serialization-json", version.ref = "kotlinSerialization" }

# AndroidX
androidx-appcompat = { module = "androidx.appcompat:appcompat", version.ref = "androidxAppcompat" }
androidx-core = { module = "androidx.core:core", version.ref = "androidxCore" }
androidx-core-ktx = { module = "androidx.core:core-ktx", version.ref = "androidxCore" }
androidx-fragment = { module = "androidx.fragment:fragment", version.ref = "androidxFragment" }
androidx-fragment-ktx = { module = "androidx.fragment:fragment-ktx", version.ref = "androidxFragment" }
androidx-recyclerview = { module = "androidx.recyclerview:recyclerview", version.ref = "androidxRecyclerview" }
